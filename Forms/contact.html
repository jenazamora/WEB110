<!-- Jena Zamora Forms-->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Contact Us</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>
<div class="container">   
<header>
    <img src="logo.jpg" alt="JCCC Logo">
    <h2>Contact Us</h2>
    <p>We'd love to hear from you! Please fill out the form below.</p>
    <hr>
</header>

<main>
<form method="post" action="https://webdevbasics.net/scripts/demo.php">

<div class="form-group">
  <label for="fname">First Name:</label>
  <input type="text" id="fname" name="firstname" maxlength="30" required>
</div>

<div class="form-group">
  <label for="lname">Last Name:</label>
  <input type="text" id="lname" name="lastname" maxlength="30" required>
</div>

<div class="form-group">
  <label for="email">Email:</label>
  <input type="email" id="email" name="email" required>
</div>

<div class="form-group">
  <label for="phone">Phone:</label>
  <input type="tel" id="phone" name="phone" placeholder="123-456-7890">
</div>

<div class="form-group">
    <label>How would you prefer we contact you?</label>
    <div class="contact-options">
    <div class="radio-option">
        <label>
      <input type="radio" name="contact" value="email" required>
      Email
    </label>
</div>
<div class="radio-option">
    <label>
      <input type="radio" name="contact" value="phone">
      Phone
    </label>
</div>
<div class="radio-option">
    <label>
      <input type="radio" name="contact" value="text">
      Text
    </label>
</div>
<div class="radio-option">
    <label>
      <input type="radio" name="contact" value="none">
      No Prefrence
    </label>
</div>
</div>
</div>
 
<div class="form-group">
  <button type="submit">Submit</button>
</div>
</form>
</main>

<footer>
    <p>&copy; 2026 Jena Zamora. All rights reserved.</p>
</footer>

</body>
</html>
